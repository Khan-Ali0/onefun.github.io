<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE FUN | Fan Club</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Arxa Fon - PNG formatında */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('fonone.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.3);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
        }

        /* Loqo - JPG formatında */
        .logo {
            width: 100%;
            max-width: 150px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 102, 0, 0.5));
        }

        .video-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            border: 2px solid #ff6600;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
        }

        .text-box {
            max-width: 700px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border-top: 3px solid #ff6600;
            backdrop-filter: blur(5px);
        }

        .az { color: #ff6600; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        .ru { color: #ccc; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <img src="logo-onefun1.jpg" alt="ONE Logo" class="logo">

        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/0CzVu-k6qeQ" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="text-box">
            <p class="az">Hörmətli oyun həvəskarları! Klana üzv qəbulu olmayacaq. Bu klan xəyali bir klandır. Əyləncə məqsədlidir</p>
            <p class="ru">Уважаемые любители игр! Набор в клан проводиться не будет. Этот клан является вымышленным. "Эта страница носит чисто развлекательный характер для любителей игр."</p>
        </div>
    </div>

</body>
</html>
